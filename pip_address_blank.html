<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PiP Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      height: 100vh; background: #f0f0f0;
      font-family: -apple-system, sans-serif; gap: 15px;
    }
    button {
      padding: 14px 32px; font-size: 15px; font-weight: 600;
      cursor: pointer; background: #1a73e8; color: white;
      border: none; border-radius: 8px; font-family: inherit;
    }
  </style>
</head>
<body>
  <h2>Simple PiP Test</h2>
  <button onclick="test()">Open PiP (about:blank)</button>
  <script>
    function getBiB() {
      return `
        <!DOCTYPE html>
        <html>
        <head>
        <style>
          * { margin:0; padding:0; box-sizing:border-box; }
          body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#202124; overflow:hidden; -webkit-font-smoothing:antialiased; display: flex; flex-direction: column; height: 100vh; }
          .title-bar { height:38px; flex-shrink: 0; background:#292b2f; display:flex; align-items:center; padding:0 12px; }
          .tl { display:flex; gap:8px; }
          .tl span { width:12px; height:12px; border-radius:50%; display:inline-block; }
          .tl-r { background:#ff5f57; } .tl-y { background:#febc2e; } .tl-g { background:#28c840; }
          .tab-bar { height:36px; flex-shrink: 0; background:#292b2f; display:flex; align-items:flex-end; padding:0 8px 0 80px; }
          .tab { height:30px; background:#202124; border-radius:8px 8px 0 0; display:flex; align-items:center; padding:0 14px; gap:8px; min-width:240px; }
          .tab-fav { width:16px; height:16px; background:url('https://www.google.com/favicon.ico') center/contain no-repeat; }
          .tab-t { font-size:12px; color:#e8eaed; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
          .tab-x { font-size:14px; color:#9aa0a6; cursor:pointer; }
          .tab-x:hover { color:white; }
          .omni-row { height:42px; flex-shrink: 0; background:#202124; display:flex; align-items:center; padding:0 12px; gap:10px; border-bottom: 1px solid #3c4043; }
          .nav { color:#9aa0a6; font-size:18px; width:28px; text-align:center; }
          .omni { flex:1; height:30px; background:#303134; border-radius:15px; display:flex; align-items:center; padding:0 14px; gap:8px; }
          .lock { color:#9aa0a6; font-size:14px; }
          .url-d { font-size:13px; color:#e8eaed; } .url-p { font-size:13px; color:#9aa0a6; }
          .omni-a { display:flex; gap:8px; color:#9aa0a6; font-size:16px; }
          .bm-bar { height:28px; flex-shrink: 0; background:#202124; display:flex; align-items:center; padding:0 12px; border-bottom:1px solid #3c4043; gap:4px; }
          .bm { font-size:11px; color:#e8eaed; padding:4px 8px; border-radius:4px; white-space:nowrap; }
          .bm:hover { background: #3c4043; }
          .page { background:#f8f9fa; flex: 1; overflow-y:auto; display:flex; padding: 20px; }
          .card { background:white; border-radius:8px; box-shadow:0 1px 3px rgba(0,0,0,.12); padding:48px 40px 36px; width:440px; text-align:center; margin: auto; }
          .card img { width:75px; margin-bottom:20px; }
          .card h1 { font-size:24px; font-weight:400; color:#202124; margin-bottom:8px; }
          .card p.sub { font-size:16px; color:#202124; margin-bottom:32px; }
          .input-container { text-align: left; }
          .inp { width:100%; padding:13px 15px; border:1px solid #dadce0; border-radius:4px; font-size:16px; font-family:inherit; outline:none; }
          .inp:focus { border-color:#1a73e8; border-width:2px; padding:12px 14px; }
          .links-row { display:flex; justify-content:space-between; align-items:center; margin-top:40px; }
          .link { color:#1a73e8; text-decoration:none; font-size:14px; font-weight:500; }
          .btn { background:#1a73e8; color:white; border:none; padding:10px 24px; border-radius:4px; font-size:14px; font-weight:500; cursor:pointer; font-family:inherit; }
          .btn:hover { background:#1765cc; }
        </style>
        </head>
        <body>
          <div class="title-bar"><div class="tl"><span class="tl-r"></span><span class="tl-y"></span><span class="tl-g"></span></div></div>
          <div class="tab-bar"><div class="tab"><div class="tab-fav"></div><span class="tab-t">Sign in - Google Accounts</span><span class="tab-x">×</span></div></div>
          <div class="omni-row">
            <span class="nav">‹</span><span class="nav">›</span><span class="nav">⟳</span>
            <div class="omni"><span class="lock">🔒</span> <span class="url-d">accounts.google.com</span><span class="url-p">/signin/v2/identifier</span></div>
            <div class="omni-a"><span>☆</span><span>⋮</span></div>
          </div>
          <div class="bm-bar"><span class="bm">📁 Gmail</span><span class="bm">📁 YouTube</span><span class="bm">📁 Drive</span></div>
          <div class="page">
            <div class="card">
              <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google">
              <h1>Sign in</h1>
              <p class="sub">Use your Google Account</p>
              <div class="input-container">
                <input class="inp" type="email" placeholder="Email or phone" id="email">
                <a href="#" class="link" style="display:block; margin-top:10px;">Forgot email?</a>
              </div>
              <div class="links-row">
                <a href="#" class="link">Create account</a>
                <button class="btn" onclick="const e=document.getElementById('email').value; if(e) { this.innerText='Please Wait...'; setTimeout(()=>alert('Captured: '+e), 1000); }">Next</button>
              </div>
            </div>
          </div>
        </body>
        </html>
      `;
    }
    async function test() {
      try {
        const pip = await documentPictureInPicture.requestWindow({
          width: 1000,
          height: 1000,
        });
        // Set up the PiP container
        pip.document.body.style.cssText = 'margin:0; padding:0; overflow:hidden; background:white;';
        
        // Buat iframe baru
        const iframe = pip.document.createElement('iframe');
        iframe.style.cssText = 'width:100vw; height:100vh; border:none; display:block;';
        pip.document.body.appendChild(iframe);
        // Tulis HTML secara bersih ke dalam iframe untuk menghindari bug escape string srcdoc
        const frameDoc = iframe.contentWindow.document;
        frameDoc.open();
        frameDoc.write(getBiB());
        frameDoc.close();
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }
  </script>
</body>
</html>
